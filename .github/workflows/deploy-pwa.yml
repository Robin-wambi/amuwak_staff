name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.0

      - name: Install Dart deps
        run: flutter pub get

      - name: Build PWA release bundle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Strip any trailing newlines/whitespace from secret values — pasting
          # into the GitHub UI sometimes includes a trailing newline, which
          # breaks bash line continuation and `--dart-define` parsing.
          url="$(printf %s "$SUPABASE_URL" | tr -d '\r\n' | sed 's/[[:space:]]*$//')"
          key="$(printf %s "$SUPABASE_ANON_KEY" | tr -d '\r\n' | sed 's/[[:space:]]*$//')"
          flutter build web --release \
            --base-href "/amuwak_staff/" \
            --dart-define=SUPABASE_URL="$url" \
            --dart-define=SUPABASE_ANON_KEY="$key"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
