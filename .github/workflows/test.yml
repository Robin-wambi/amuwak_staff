name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to the version the PWA is built/deployed with (deploy-pwa.yml).
          # Floating `stable` drifts to newer Flutter and flags deprecations
          # (e.g. FormField `value` -> `initialValue`, deprecated after 3.33.0)
          # for APIs this app doesn't target, failing `melos run analyze`.
          flutter-version: 3.32.0
      - run: flutter pub get
      # melos scripts shell out to `melos exec`, so the melos executable must be
      # on PATH (not just available via `dart run melos`).
      - run: dart pub global activate melos
      - run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - run: melos run analyze
      - run: melos run test
